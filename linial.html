<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano Cartesiano Sombreado</title>
</head>
<body>
    <h2>Plano Cartesiano con Rejilla y Números</h2>
    <canvas id="myCanvas" width="800" height="400" style="border: 1px solid black; background-color: #fdfdfd;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        var time = 0;
        var centroX = 200; 
        var centroY = 200; 
        var pasoRejilla = 50; // Distancia entre líneas de la cuadrícula

        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- 1. DIBUJAR REJILLA DE FONDO (Sombreado) ---
            ctx.beginPath();
            ctx.strokeStyle = '#e0e0e0'; // Gris muy claro
            ctx.lineWidth = 1;

            // Líneas verticales de la rejilla
            for (var x = 0; x <= canvas.width; x += pasoRejilla) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
            }

            // Líneas horizontales de la rejilla
            for (var y = 0; y <= canvas.height; y += pasoRejilla) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();

            // --- 2. DIBUJAR EJES PRINCIPALES (Rojos) ---
            ctx.beginPath();
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 2;
            ctx.moveTo(0, centroY); ctx.lineTo(canvas.width, centroY); // Eje X
            ctx.moveTo(centroX, 0); ctx.lineTo(centroX, canvas.height); // Eje Y
            ctx.stroke();

            // --- 3. DIBUJAR NÚMEROS Y MARCAS ---
            ctx.fillStyle = "black";
            ctx.font = "bold 11px Arial";
            
            for (var i = 0; i <= canvas.width; i += pasoRejilla) {
                var valorX = i - centroX;
                var valorY = centroY - i;

                // Números en X
                ctx.textAlign = "center";
                ctx.fillText(valorX, i, centroY + 20);

                // Números en Y (evitamos el 0 central para que no se amontone)
                if (valorY !== 0 && i <= canvas.height) {
                    ctx.textAlign = "right";
                    ctx.fillText(valorY, centroX - 10, i + 5);
                }
            }

            // --- 4. DIBUJAR ONDA DINÁMICA (Azul) ---
            ctx.beginPath();
            ctx.strokeStyle = 'blue';
            ctx.lineWidth = 2;

            for (var x = 0; x < canvas.width; x++) {
                // y = sin(x) escalado
                var yRelativa = Math.sin((x - centroX) * 0.02 + time);
                var yCanvas = centroY - (yRelativa * 100);

                if (x === 0) ctx.moveTo(x, yCanvas);
                else ctx.lineTo(x, yCanvas);
            }
            ctx.stroke();
        }

        function animate() {
            drawGraph();
            time -= 0.05;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
